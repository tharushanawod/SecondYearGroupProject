<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Products Page</title>
    <link rel="stylesheet" href="Delete product.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="images/corn.png" alt="CornCradle Logo">
        </div>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Products</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
        <button class="logout-button">Log Out</button>
    </header>
    <div class="container">
        <h1>Delete Products</h1>
        
        <table id="productTable">
            <thead>
                <tr>
                    <th>Product Name</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Stock</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <!-- Example row -->
                <tr>
                    <td>Example Product</td>
                    <td>Fertilizer</td>
                    <td>LKR 1000</td>
                    <td>50</td>
                    <td class="actions">
                        <button class="delete">Delete</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <script src="Delete product.js"></script>
</body>
</html>
