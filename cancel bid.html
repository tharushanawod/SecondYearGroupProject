<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cancel Bid</title>
    <link rel="stylesheet" href="cancel bid.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="images/corn.png" alt="CornCradle Logo">
        </div>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="landing page.html">Products</a></li>
                <li><a href="Contact us.html">Contact</a></li>
            </ul>
        </nav>
        <button class="logout-button">Log Out</button>
    </header>
    <div class="header1">
        <div class="header-content">
            <h1>Cancel Bid</h1>
            <div class="search-container">
                <input type="text" id="search" placeholder="Search products..." onkeyup="filterProducts()">
                <button id="searchBtn">Search</button>
            </div>
        </div>
        <img src="images/img38.png" alt="Corn image" class="header-image">
    </div>

    <div class="container">
        <div class="product-card">
            <img src="images/img7.jpeg" alt="Product Image" class="product-img">
            <div class="product-details">
                <h3>Fresh Corn</h3>
                    <p>Current Bid: LKR 1000</p>
                    <p>Number of Bids: 5</p>
                    <p>Status: Active</p>
                    <p>Specifications: Large, Yellow, Organic</p>
                    <p>Time Remaining: 02:30:15</p>
                    <p>Quantity: 100 kg</p>
            </div>
        </div>            
    </div>

    <div class="container">
        <div class="cancel-reason">
            <label for="reason">Reason For Cancellation</label>
            <select id="reason">
                <option value="">Select a Reason</option>
                <option value="reason1">Reason 1</option>
                <option value="reason2">Reason 2</option>
                <option value="reason3">Reason 3</option>
            </select>
        </div>
    </div>

    <div class="container">
        <div class="confirmation">
            <p>Are you sure you want to cancel this bid? This action cannot be undone.</p>
            <button class="cancel-btn">Cancel Bid</button>
            <a href="place bid.html" target="content-frame">
                <button class="adjust-btn">Adjust Bid</button>
            </a>
        </div>
    </div>

    <script src="cancel bid.js"></script>
</body>
</html>
